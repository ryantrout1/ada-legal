<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- color-scheme — declares supported schemes so the browser does NOT
         apply automatic dark-mode inversion to our site when the OS is
         set to dark. The user picks their display mode via the
         accessibility panel; the browser must not override that.
         Edge and Chrome respect this; Firefox and Safari follow the
         same spec. The actual dark theme is delivered by our own
         data-display="dark" CSS, which is opt-in. -->
    <meta name="color-scheme" content="light" />
    <title>ADA Legal Link — Know the Law. Know Your Rights.</title>
    <meta name="description" content="Free, plain-language ADA help for everyone. Talk to Ada. 43 interactive diagrams. Fully accessible. Forever free." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ADA Legal Link" />
    <meta property="og:url" content="https://adalegallink.com" />
    <meta property="og:title" content="ADA Legal Link — Know the Law. Know Your Rights." />
    <meta property="og:description" content="Free, plain-language ADA help for everyone. Talk to Ada. 43 interactive diagrams. Fully accessible. Forever free." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ADA Legal Link — Know the Law. Know Your Rights." />
    <meta name="twitter:description" content="Free, plain-language ADA help for everyone. Talk to Ada. 43 interactive diagrams. Fully accessible. Forever free." />

    <!-- Fonts — Fraunces (display serif) + IBM Plex Sans (body, dyslexia-friendly)
         + Atkinson Hyperlegible (low vision) + Lexend (reading fluency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&family=Lexend:wght@400;500;600&display=swap"
    />
    <!-- OpenDyslexic — not on Google Fonts; loaded from jsdelivr CDN. Used
         only when the user explicitly selects the "OpenDyslexic" font option. -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/opendyslexic@5.1.0/400.css"
      media="print"
      onload="this.media='all'"
    />

    <!-- Accessibility settings — applied pre-render to prevent FOUC (Step 15.5).
         Reads localStorage.ada-a11y and sets data-* attributes on <html> so the
         CSS in app.css can style everything from the root before React mounts.

         CSP NOTE: This script's exact byte content is hashed in
         vercel.json's Content-Security-Policy script-src directive
         (sha256-8XoUVeZxZLTf4yP8mCTrdvCtweK4ZLQp5eypOvo6Dw4=). If you
         edit the script body — even whitespace — recompute the hash
         and update vercel.json in the same commit, or the script
         will be blocked once CSP enforcement flips on. -->
    <script>
      (function () {
        try {
          var h = document.documentElement;
          var raw = localStorage.getItem('ada-display-prefs');
          var s = raw ? JSON.parse(raw) : null;
          if (!s) {
            var legacy = localStorage.getItem('ada-a11y');
            if (legacy) {
              var l = JSON.parse(legacy);
              s = {
                displayMode: l.display === 'contrast' ? 'high-contrast' : l.display,
                fontSize: l.size === 'medium' ? 'default' : l.size,
                lineSpacing: l.spacing,
                fontFamily: l.font,
                readingLevel: localStorage.getItem('ada-reading-level-guide')
              };
            } else if (matchMedia('(prefers-contrast: more)').matches) {
              s = { displayMode: 'high-contrast' };
            } else if (matchMedia('(prefers-color-scheme: dark)').matches) {
              s = { displayMode: 'dark' };
            }
          }
          if (!s) return;
          var d = s.displayMode === 'high-contrast' ? 'contrast' : s.displayMode;
          if (d && d !== 'default') h.setAttribute('data-display', d);
          if (s.fontFamily && s.fontFamily !== 'default') h.setAttribute('data-font', s.fontFamily === 'lexie' ? 'lexend' : s.fontFamily);
          if (s.fontSize && s.fontSize !== 'default') h.setAttribute('data-size', s.fontSize);
          if (s.lineSpacing && s.lineSpacing !== 'default') h.setAttribute('data-spacing', s.lineSpacing);
          if (s.readingLevel && s.readingLevel !== 'standard') h.setAttribute('data-reading-level', s.readingLevel);
        } catch (e) {
          /* ignore — panel will re-apply on mount */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
