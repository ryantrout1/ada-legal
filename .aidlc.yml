# .aidlc.yml — per-repo AIDLC conventions. Skills read this on entry (AOS-029).
project: ADA Legal Link
repo_role: engine + portal
github: ryantrout1/ada-legal
remote_protocol: https
sibling_repos:
  - github: ryantrout1/ada-legal-link-B44
    role: admin UI (Base44)
environments: [claude-code]
commit_author_email: rttg123@gmail.com   # required for Vercel commit-author gate
install_prestep: npm install
test_runner: vitest
gate_command: npm run build              # = "tsc --noEmit && vite build" — typecheck gate built in
lint_command: deferred                   # package.json has "eslint ." but eslint is NOT installed -> exit 127 (AOS-008)
notes: >
  Direct push to main over HTTPS (PAT). Neon-backed. Migration 0019 applied to prod
  (attorney-portal schema). Flag ada_universal_cta currently OFF. Sibling repo
  ada-legal-link-B44 holds the Base44 admin UI for cross-repo features.
